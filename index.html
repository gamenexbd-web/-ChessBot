<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pro Auto Ads</title>

<!-- Monetag SDKs -->
<script src='//libtl.com/sdk.js' data-zone='10742995' data-sdk='show_10742995'></script>
<script src='//libtl.com/sdk.js' data-zone='10742999' data-sdk='show_10742999'></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(270deg,#0F2027,#203A43,#2C5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,255,255,0.2);
    width: 90%;
    max-width: 400px;
}

h2 { margin-bottom: 20px; color: #00E5FF; }

button {
    width: 200px;
    padding: 12px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.watch { background: #00C853; }
.watch:hover { box-shadow: 0 0 15px #00C853; }

.auto { background: #00E5FF; color: black; }
.auto:hover { box-shadow: 0 0 15px #00E5FF; }

.stop { background: #FF3D00; }
.stop:hover { box-shadow: 0 0 15px #FF3D00; }

.loader { margin-top: 20px; display: none; }
.spinner {
    width: 40px;
    height: 40px;
    border: 5px solid rgba(255,255,255,0.2);
    border-top: 5px solid #00E5FF;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<div class="container">
    <h2>🚀 Pro Auto Ads System</h2>

    <button class="watch" onclick="showTwoAds()">Watch Ads</button><br>
    <button class="auto" onclick="startAuto()">Auto Method ON</button><br>
    <button class="stop" onclick="stopAuto()">Stop</button>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Ad Playing...</p>
    </div>
</div>

<script>
let isRunning = false;
let autoTimeout = null;

// 🔥 Watch Ads: দুই Zone একে অপরের পরে
function showTwoAds() {
    document.getElementById("loader").style.display = "block";

    try { show_10742995(); } catch(e){ console.log("Zone 1 Ad error:", e); }

    // 18 সেকেন্ড পরে Zone 2 চালাও
    setTimeout(() => {
        try { show_10742999(); } catch(e){ console.log("Zone 2 Ad error:", e); }

        // 18 সেকেন্ড পরে loader hide
        setTimeout(() => { document.getElementById("loader").style.display = "none"; }, 18000);

    }, 18000);
}

// 🔁 Auto Loop (Watch Ads sequential)
function startAuto() {
    if (isRunning) return;
    isRunning = true;
    runAuto();
}

function runAuto() {
    if (!isRunning) return;

    showTwoAds(); // Auto এও দুই Zone sequentially দেখাবে

    // 36 সেকেন্ড play + 2 সেকেন্ড gap
    autoTimeout = setTimeout(() => {
        if (isRunning) autoTimeout = setTimeout(runAuto, 2000);
    }, 36000);
}

// 🛑 Stop Auto
function stopAuto() {
    isRunning = false;
    clearTimeout(autoTimeout);
    document.getElementById("loader").style.display = "none";
}
</script>

</body>
</html>
